  // ─── CART HELPERS ───────────────────────────
  getCart() {
    try { return JSON.parse(localStorage.getItem('spt_cart') || '[]'); } catch{ return []; }
  },
  setCart(cart) {
    localStorage.setItem('spt_cart', JSON.stringify(cart));
    this.updateCartBadge();
  },
  updateCartBadge() {
    const cart = this.getCart();
    const count = cart.reduce((s,i) => s + i.qty, 0);
    document.querySelectorAll('.cart-badge').forEach(el => el.textContent = count);
  },
  addToCart(id, qty=1) {
    const p = this.PRODUCTS.find(x => x.id === id) || this.PACKAGES.find(x => x.id === id);
    if(!p) return;
    const cart = this.getCart();
    const ex = cart.find(i => i.id === id);
    const inCart = ex ? ex.qty : 0;
    const toAdd = Math.min(qty, (p.stock||999) - inCart);
    if(toAdd <= 0) { this.toast('⚠️','Stock máximo alcanzado',''); return false; }
    if(ex) { ex.qty += toAdd; } else { cart.push({id, name:p.name, emoji:p.emoji||'📦', price:p.price, qty:toAdd, stock:p.stock||999}); }
    this.setCart(cart);
    this.toast('✅', `${p.name} añadido al carrito`, `Cantidad: ${toAdd}`);
    return true;
  },

  // ─── AUTH ───────────────────────────────────
  getSession() {
    try { return JSON.parse(sessionStorage.getItem('spt_user') || 'null'); } catch{ return null; }
  },
  setSession(user) { sessionStorage.setItem('spt_user', JSON.stringify(user)); },
  clearSession() { sessionStorage.removeItem('spt_user'); },
  requireAuth() {
    if(!this.getSession()) { window.location.href = 'login.html'; return false; }
    return true;
  },

  // ─── TOAST ──────────────────────────────────
  toast(icon, title, sub) {
    let c = document.getElementById('toastC');
    if(!c) { c = document.createElement('div'); c.id='toastC'; c.style.cssText='position:fixed;bottom:90px;left:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(c); }
    const t = document.createElement('div');
    t.style.cssText='background:#1e1e1e;border:1px solid #c6f135;border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;max-width:300px;animation:slideInLeft .35s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)';
    t.innerHTML = `<span style="font-size:1.2rem">${icon}</span><div><div style="font-size:.82rem;font-weight:600;color:#f0f0f0">${title}</div>${sub?`<div style="font-size:.73rem;color:#777">${sub}</div>`:''}</div>`;
    c.appendChild(t);
    setTimeout(() => { t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 3000);
  },

  // ─── TRACKING CODE ──────────────────────────
  genTrackingCode() {
    return 'SPT-2026-' + Math.random().toString(36).substr(2,6).toUpperCase();
  },
};

// Global keyframe for toast animation
